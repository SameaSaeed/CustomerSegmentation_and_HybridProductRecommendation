# ==============================
# ENVIRONMENT
# ==============================
env: dev


# ==============================
# DATABRICKS SETUP
# ==============================
databricks:
  catalog: customersegmentation
  schema: default


# ==============================
# STORAGE PATHS
# ==============================
paths:
  raw: /Volumes/main/customer_segmentation/data_volume/raw
  checkpoints: /Volumes/main/customer_segmentation/data_volume/checkpoints


# ==============================
# INGESTION CONFIG (AUTOLOADER SOURCE OF TRUTH)
# ==============================
ingestion:
  tables:
    - orders_dataset
    - order_items_dataset
    - customers_dataset
    - order_payments_dataset
    - order_reviews_dataset
    - products_dataset
    - product_category_name_translation
    - geolocation_dataset
    - sellers_dataset
    - rec_data


# ==============================
# TABLE REGISTRY (SINGLE SOURCE OF TRUTH)
# ==============================
tables:

  bronze:
    orders: orders_dataset
    customers: customers_dataset
    order_items: order_items_dataset
    payments: order_payments_dataset
    reviews: order_reviews_dataset
    products: products_dataset
    category: product_category_name_translation
    geo: geolocation_dataset
    sellers: sellers_dataset
    rec_data: rec_data

  silver:
    clean: clean_orders

  gold:
    rfm: rfm
    clusters: clusters


# ==============================
# SILVER LAYER CONFIG (CLEANING RULES)
# ==============================
cleaning:
  drop_cols:
    - customer_id
    - seller_id
    - shipping_limit_date
    - customer_zip_code_prefix

  required_fields:
    - order_purchase_timestamp
    - order_item_id

  date_columns:
    - order_purchase_timestamp
    - order_approved_at

  filters:
    order_status: delivered


# ==============================
# FEATURE ENGINEERING
# ==============================
feature_engineering:
  timestamp_col: order_purchase_timestamp


# ==============================
# PIPELINE CONTROL
# ==============================
run:
  validation: true
  clustering: true


# ==============================
# SPARK CONFIG
# ==============================
spark:
  spark.sql.shuffle.partitions: 200
  spark.sql.adaptive.enabled: true


# ==============================
# RFM CONFIG
# ==============================
rfm:
  timestamp_col: order_purchase_timestamp
  customer_col: customer_id
  order_col: order_id
  monetary_col: price

  recency_days_bins: [14, 30, 60, 180]
  frequency_bins: [1, 2, 4, 6]
  monetary_bins: [250, 500, 1000, 2000]


# ==============================
# CLUSTERING CONFIG
# ==============================
clustering:
  k: 5
  seed: 42
  features:
    - recency
    - frequency
    - monetary
  scale: true


# ==============================
# RECOMMENDER CONFIG
# ==============================
recommender:

  type: hybrid   # options: als | content | hybrid

  hybrid:
    als_weight: 0.5
    content_weight: 0.5

  ranking:
    top_n: 10
    score_col: final_score
    group_by: customer_id
    order_by: desc

  filtering:
    remove_seen_items: true
    min_score: 0.0

  cold_start:
    strategy: popularity   # options: popularity | content | global_avg
    fallback_top_n: 20

  business_rules:
    vip_boost: 1.3
    loyal_boost: 1.1
    normal_boost: 1.0

    segment_col: segment

  als:
    enabled: true
    fallback_to_als_only: false

  content:
    enabled: true
    cosine_similarity: true

  diversity:
    enabled: true
    max_same_category: 3

  explainability:
    enabled: true
    return_reasons: true
    factors:
      - als_score
      - content_score
      - segment_boost

model_export:

  format: pickle   # options: pickle | mlflow | parquet_bundle

  artifacts:
    user_factors: true
    item_factors: true
    product_vectors: true
    user_profiles: true
    rfm_segments: true

  output:
    base_path: /Volumes/main/customer_segmentation/model_store
    versioning: true
    version_strategy: timestamp   # options: timestamp | incremental | uuid

  filenames:
    bundle_name: hybrid_recommender
    extension: pkl

  serialization:
    pandas_conversion: true
    compress: false

  registry:
    enable: false   # future MLflow / Databricks model registry hook
    model_name: hybrid_recommender
    stage: dev


# ==============================
# LOGGING
# ==============================
logging:
  level: INFO